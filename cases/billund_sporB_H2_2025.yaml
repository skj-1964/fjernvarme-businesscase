# ==============================================================================
# BILLUND VARMEVÆRK — Spor B (deskriptiv): CM-pris-gate, H2 2025 (RENT VINDUE)
# ==============================================================================
# Afledt af billund_sporB_q1_2026.yaml. Formål (handoff v8): rekalibrér
# reservation_gate mod H2 2025-facit (seks RENE måneder uden indkøringsanomali),
# og test out-of-sample på mar–apr 2026. v7 viste at Q1-snit-kalibreringen var
# forurenet af jan–feb-indkøringsanomalien (gaten under-reserverede).
#
# FLÅDE H2 2025 (vigtigt — skift ift. 2026):
#   * vp_luft_vand: SLET IKKE i drift (enabled: false) — hverken varme eller
#     balance. Steen-bekræftet. (2026: VP i drift, på balance fra 1. marts.)
#   * elkedel_ny: under indkøring, kører ikke (enabled: false).
#   * Reservationen bæres derfor 100 % af elkedel_gl (15 MW el).
#
# FACIT-MØNSTER H2 2025 (FORB Op, kap_MW_snit) — kraftigt aFRR-vægtet:
#   aFRR: jul 5,38 / aug 4,63 / sep 5,84 / okt 3,48 / nov 3,78 / dec 0,50
#   mFRR: jul 0,04 / aug 0,11 / sep 0,21 / okt 0,06 / nov 0,12 / dec 0,04
#   (vidt forskelligt fra Q1 2026, hvor aFRR≈mFRR≈0,5–1,2 MW.)
#
# KØRES MED:
#   python run_case.py cases/billund_sporB_H2_2025.yaml \
#       --data-source github --with-balancing --balancing-method activation_value \
#       --start 2025-07-01 --end 2025-12-31 \
#       --heat-csv data/billund_abvaerk_hourly.csv --out-dir out/sporB_H2_2025
#
# KALIBRERING: scripts/calibrate_gate.py fitter cm_threshold + block_mw pr.
#   marked mod H2-facit (månedlig reservation). VALIDERING:
#   scripts/capture_rate.py --facit noter/billund_balance_facit_H2_2025_tidy.csv
# ==============================================================================

meta:
  case_name: "billund_sporB_H2_2025"
  description: >
    Spor B (deskriptiv): CM-pris-gate (mode=driven) på reservationen, H2 2025
    (rent vindue, ingen indkøringsanomali). VP slet ikke i drift; reservation
    100 % på elkedel_gl. Gate-tærskler rekalibreret mod H2 2025-facit og testet
    out-of-sample på mar–apr 2026 (flåde-invariant via block/cap-andel).
  timezone_internal: "UTC"
  timezone_reporting: "Europe/Copenhagen"
  discount_rate_real: 0.035
  tax_year: 2025

# ------------------------------------------------------------------------------
# TIDSHORISONT
# ------------------------------------------------------------------------------
time:
  start: "2025-07-01T00:00:00Z"
  end:   "2025-12-31T23:00:00Z"
  resolution: "1h"

# ------------------------------------------------------------------------------
# VARMELAST-SYNTESE (parses men ignoreres når --heat-csv er aktivt)
# ------------------------------------------------------------------------------
heat_load_params:
  gaf_mw_per_k: 0.9761
  t_ref: 15.0
  thermal_inertia_hours: 24
  nettab_slope_mw_per_k: 0.6081
  t_net: 12.0
  baseline_profile_mw:
    [5.66, 5.74, 5.87, 6.08, 6.15, 6.52,
     7.13, 7.15, 6.83, 6.32, 6.09, 5.99,
     5.82, 5.70, 5.63, 5.56, 5.65, 5.87,
     6.03, 6.08, 6.04, 6.03, 5.88, 5.60]
  weekly_dip: 0.02
  _source: "Kalibreret mod Billund ab værk — ignoreres ved --heat-csv"

# ------------------------------------------------------------------------------
# PRISER OG AFGIFTER  (BEKRÆFT: kopieret fra H2 2025 — opdatér til Q1 2026)
# ------------------------------------------------------------------------------
prices:
  natural_gas:
    value: 550.0           # 3 kr/Nm3 commodity (ekskl moms) + kedel-afgifter 3,5349 kr/Nm3 (faktura, ekskl moms) ÷ 11,881 kWh/Nm3
    unit: "DKK/MWh_fuel"
  straw:
    value: 204.6           # 1.030 kr/ton inkl moms ÷ 1,25 ÷ 14,5 GJ/ton × 3,6 (ekskl moms)
    unit: "DKK/MWh_fuel"
  flis:
    value: 195.8           # 68,0 kr/GJ inkl moms ÷ 1,25 × 3,6 (ekskl moms) — egen pris, ikke længere lig halm
    unit: "DKK/MWh_fuel"
  waste_heat:
    value: 50.0
    unit: "DKK/MWh_fuel"
  co2_eua:
    value: 0.0
    unit: "DKK/MWh_gas"

# ------------------------------------------------------------------------------
# ELMARKED OG TARIFFER
# ------------------------------------------------------------------------------
