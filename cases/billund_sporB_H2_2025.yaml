# ------------------------------------------------------------------------------
# VARMELAGER  (BEKRÆFT volumen jan–apr 2026: 12.000 vs 22.000 m³ VAK26)
# ------------------------------------------------------------------------------
storage:
  tank_eksisterende:
    enabled: true
    volume_m3: 12000
    delta_t_k: 40.0
    e_max_mwh: null
    e_initial_mwh: 279
    p_max_charge_mw: 60.0
    p_max_discharge_mw: 60.0
    self_discharge_per_hour: 0.0
    cycle_binding: true
    notes: "BEKRÆFT volumen for jan–apr 2026 fra driftsvirkelighed."

# ------------------------------------------------------------------------------
# BALANCEMARKED — activation_value + CM-pris-gate (Spor B, driven)
# ------------------------------------------------------------------------------
# reservation_gate (Spor B, deskriptiv):
#   enabled: true, mode: driven → reservationen DRIVES af CM-gaten:
#       Σ_i r_m[i,t] == gate_m(t) · block_mw
#   gate_m(t) = 1 hvis CM_m(t) ≥ cm_threshold_dkk_mw_h ellers 0.
#   Tærskel + blok REKALIBRERET mod H2 2025-facit (scripts/calibrate_gate.py).
#   H2-reservationen er kraftigt aFRR-vægtet (snit ~4 MW) og mFRR ~marginal.
#   Værdierne nedenfor er fit-resultatet (se STATUS v8).
balancing:
  method: activation_value
  bid_strategy:
    up_markup_dkk_mwh: 500
    up_markup_max_dkk_mwh: 2000
  ancillary_caps:
    per_unit_mw: {}          # VP disabled i H2 → intet per-enheds-loft
    # H2 2025-prækvalificering [BEKRÆFT]: kun elkedel_gl (15 MW el) bærer reserven.
    # Handoff §9: H2-loftet ~15 MW. Facit aFRR-peak-måned 5,84 MW-snit → loftet
    # binder ikke gaten. Bruges som nævner i flåde-invariant block/cap-andel.
    total_mw: 15.0
  reservation_gate:
    enabled: true
    mode: driven             # driven (Spor B) | bound (Spor A senere)
    # REKALIBRERET mod H2 2025 (calibrate_gate.py, B≤cap):
    #   aFRR: τ=50, B=6,39 (42,6% af cap). SVAGT fit (RMSE 1,68 MW, form-korr
    #     0,30): H2-aFRR var næsten KONTINUERT ~5 MW, ikke en selektiv pris-gate.
    #     Misser december voldsomt (model 3,87 vs facit 0,50 — adfærds-stop).
    #   mFRR: τ=900, B=3,44 (22,9% af cap). Godt fit (RMSE 0,027, korr 0,89),
    #     men marginal volumen.
    afrr: { cm_threshold_dkk_mw_h: 50, block_mw: 6.39 }
    mfrr: { cm_threshold_dkk_mw_h: 900, block_mw: 3.44 }

# ------------------------------------------------------------------------------
# INVESTERING (ikke aktiv i backtest)
# ------------------------------------------------------------------------------
investment:
  enabled: false
