# ==============================================================================
# BILLUND VARMEVÆRK — Basiscase, helt kalenderår 2025
# ==============================================================================
# Fuld-års basiscase til varmeflex-demoen. Den fulde, moderne flåde kørt mod
# 2025's markedsforhold (spot + temperatur fra github-data, varmelast
# syntetiseret fra heat_load_params). Udgangspunkt for den differentielle
# business case — A/B/C dannes via CLI-flag på DENNE ene YAML, så anlægget
# kun har én kilde til sandhed.
#
# Afledt af cases/billund_backtest_jan_apr_2026.yaml (samme maskine:
# activation_value-balancering, bid_strategy, generiske caps, fliskedel).
#
# VALG TRUFFET VED AFLEDNING (ift. backtest-casen):
#   * Periode: hele 2025 (var jan–apr 2026).
#   * elkedel_ny ER i drift → enabled: true. Dermed total reserve-loft 33 MW
#     (var 15 MW, fordi elkedel_ny var ude under inkøring).
#   * CO2: fysisk udledning 0,2 t/MWh på gas genindført (var 0), og co2_eua
#     sat til et niveau, så CO2 både tæller i økonomien og rapporteres i
#     manifestet. [BEKRÆFT 2025-niveau].
#   * Ingen --heat-csv: varmelasten syntetiseres, så heat_load_params er aktive.
#
# KØRES MED (hele 2025, fuld flåde, balancering):
#   python run_case.py cases/billund_2025.yaml --data-source github --with-balancing
#
# DEN DIFFERENTIELLE BUSINESS CASE (samme YAML, kun CLI-toggles):
#   C  (tank + balance):   --data-source github --with-balancing
#   A  (tank, ingen bal):  --data-source github
#   B  (ingen tank/bal):   --data-source github --disable tank_eksisterende
#   → C−A = værdien af balancemarkedet, A−B = værdien af tanken.
#   Metodesammenligning:   --with-balancing --balancing-method legacy
#
# INLINE-MARKØRER: [BEKRÆFT] = afklar med Billund/John. (≠backtest) = afviger
# bevidst fra backtest-casens værdi; backtest-tallet nævnt i kommentaren.
# ==============================================================================

meta:
  case_name: "billund_2025"
  description: >
    Basiscase 2025 — fuld flåde mod 2025's markedsforhold, activation_value-
    balancering. Udgangspunkt for den differentielle business case (A/B/C via
    CLI-flag). Anlægstal afspejler Billunds faktiske enheder; periode-nøjagtig
    driftstilgængelighed er bevidst forenklet.
  titel: "Billund 2025 — fuld flåde"
  gruppe: "billund_2025"
  timezone_internal: "UTC"
  timezone_reporting: "Europe/Copenhagen"
  discount_rate_real: 0.035
  tax_year: 2025

# ------------------------------------------------------------------------------
# TIDSHORISONT — hele kalenderåret 2025
# ------------------------------------------------------------------------------
time:
  start: "2025-01-01T00:00:00Z"
  end:   "2025-12-31T23:00:00Z"
  resolution: "1h"

# ------------------------------------------------------------------------------
# VARMELAST-SYNTESE (AKTIV — ingen --heat-csv i denne case)
# ------------------------------------------------------------------------------
# Q(t) = baseline(h) + gaf·max(0, t_ref − EMA(T_out)) + nettab-led.
# Bemærk: baseline har en nyere to-leddet fysisk nettab-model (session 21).
# Den kan porteres ind her for højere syntesepræcision, hvis ønsket.
heat_load_params:
  gaf_mw_per_k: 0.9761
  t_ref: 15.0
  thermal_inertia_hours: 24
  nettab_slope_mw_per_k: 0.6081
  t_net: 12.0
  baseline_profile_mw:
    [5.66, 5.74, 5.87, 6.08, 6.15, 6.52,
     7.13, 7.15, 6.83, 6.32, 6.09, 5.99,
     5.82, 5.70, 5.63, 5.56, 5.65, 5.87,
     6.03, 6.08, 6.04, 6.03, 5.88, 5.60]
  weekly_dip: 0.02
  _source: "Kalibreret mod Billund ab værk (dual-slope v2) — aktiv ved syntese"

# ------------------------------------------------------------------------------
# PRISER OG AFGIFTER  [BEKRÆFT 2025-niveau — kopieret fra backtest-casen]
# ------------------------------------------------------------------------------
prices:
  natural_gas:
    value: 606.0
    unit: "DKK/MWh_fuel"
  straw:
    value: 232.0
    unit: "DKK/MWh_fuel"
  flis:
    value: 232.0
    unit: "DKK/MWh_fuel"
  waste_heat:
    value: 50.0
    unit: "DKK/MWh_fuel"
  co2_eua:
    value: 600.0           # (≠backtest: var 0) [BEKRÆFT] ~80 EUR/t × 7,45
    unit: "DKK/MWh_gas"

# ------------------------------------------------------------------------------
# ELMARKED OG TARIFFER
# ------------------------------------------------------------------------------
electricity:
  spot_area: "DK1"
  tariff_consumption_flat: 125.0
  tariff_production_flat: 4.1
  electricity_tax: 4.0

# ------------------------------------------------------------------------------
# PRODUKTIONSENHEDER — fuld flåde
# ------------------------------------------------------------------------------
units:

  vp_luft_vand:
    enabled: true
    type: "heat_pump"
    p_max_heat: 16.0
    p_min_heat: 0.0
    alpha: -0.333
    fuel: "electricity"
    var_om: 13.4
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    cop_curve:
      type: linear
      a: 2.2
      b: 0.08
      cop_min: 1.8
      cop_max: 4.0
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2025

  # ---- Elkedel ny (30 MW) — I DRIFT i denne case (≠backtest: var false) ----
  elkedel_ny:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 30.0
    p_min_heat: 0.0
    alpha: -1.0
    fuel: "electricity"
    var_om: 13.4
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2025

  elkedel_gl:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 15.0
    p_min_heat: 0.0
    alpha: -1.0
    fuel: "electricity"
    var_om: 6.71
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2021

  fliskedel:
    enabled: true
    type: "biomass_boiler"
    p_max_heat: 7.0
    p_min_heat: 2.0           # [BEKRÆFT] ~29% min-last
    alpha: 0.0
    fuel: "flis"
    eta_fuel_to_heat: 0.94
    var_om: 30.0              # [BEKRÆFT]
    start_cost: 5000.0        # [BEKRÆFT]
    min_uptime: 72            # skal mindst køre 72 timer ad gangen
    min_downtime: 6
    uc_enabled: true
    initial_status: 1
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2009

  halmkedel:
    enabled: true
    type: "biomass_boiler"
    p_max_heat: 12.0
    p_min_heat: 4.0
    alpha: 0.0
    fuel: "straw"
    eta_fuel_to_heat: 0.96
    var_om: 30.0
    start_cost: 8000.0
    min_uptime: 4
    min_downtime: 6
    uc_enabled: true
    initial_status: 1
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2015

  gasmotor:
    enabled: true
    type: "gas_engine_chp"
    p_max_heat: 2.8
    p_min_heat: 0.9
    alpha: 0.72
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.49
    var_om: 608.0             # [BEKRÆFT] påfaldende høj vs baseline (60) — tjek konvention
    start_cost: 2000.0
    min_uptime: 2
    min_downtime: 2
    uc_enabled: false
    initial_status: 0
    co2_emissions_per_mwh_fuel: 0.2   # (≠backtest: var 0) fysisk udledning naturgas
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
      afrr_max_bid_mw: 1.0
      mfrr_max_bid_mw: 2.0
    commissioned: 2000

  gaskedel_agg:
    enabled: true
    type: "gas_boiler"
    p_max_heat: 16.3          # [BEKRÆFT] baseline har bekræftet 26,3 (23-apr-2026)
    p_min_heat: 0.0
    alpha: 0.0
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.95
    var_om: 89.0              # [BEKRÆFT] høj vs baseline (20) — tjek konvention
    start_cost: 500.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    co2_emissions_per_mwh_fuel: 0.2   # (≠backtest: var 0) fysisk udledning naturgas
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}

  overskudsvarme:
    enabled: false
    type: "waste_heat"
    p_max_heat: 4.0
    p_min_heat: 4.0
    alpha: 0.0
    fuel: "waste_heat"
    eta_fuel_to_heat: 1.0
    var_om: 5.0
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2026

# ------------------------------------------------------------------------------
# VARMELAGER
# ------------------------------------------------------------------------------
# Billund-bekræftet fysisk total (23-apr-2026): 2×2.000 + 1×10.000 = 14.000 m³.
# (≠backtest: brugte 12.000 m³ / Δt 40 som periode-specifik driftsværdi.)
storage:
  tank_eksisterende:
    enabled: true
    volume_m3: 14000          # (≠backtest: 12.000) bekræftet fysisk total
    delta_t_k: 45.0           # [BEKRÆFT] frem/retur
    e_max_mwh: null           # beregnes ≈ 732 MWh fra volume + Δt
    e_initial_mwh: 366        # halvfuld; cycle_binding fikser slutniveau
    p_max_charge_mw: 25.0     # [BEKRÆFT]
    p_max_discharge_mw: 25.0  # [BEKRÆFT]
    self_discharge_per_hour: 0.0005   # ~0,05%/t (≠backtest: 0)
    cycle_binding: true
    notes: "Bekræftet fysisk total. Backtest brugte 12.000 m³ for jan–apr 2026."

# ------------------------------------------------------------------------------
# BALANCEMARKED — activation_value (kovarians-korrekt) + generiske caps
# ------------------------------------------------------------------------------
# total_mw: 33 fordi BEGGE elkedler er i drift her (≠backtest: 15, elkedel_ny ude).
# per_unit VP ≤ 6 MW håndhæves altid.
balancing:
  method: activation_value
  bid_strategy:
    up_markup_dkk_mwh: 500
    up_markup_max_dkk_mwh: 2000
  ancillary_caps:
    per_unit_mw:
      vp_luft_vand: 6.0
    total_mw: 33.0            # (≠backtest: 15) begge elkedler i drift

# ------------------------------------------------------------------------------
# INVESTERING (ikke aktiv i basiscase)
# ------------------------------------------------------------------------------
investment:
  enabled: false
