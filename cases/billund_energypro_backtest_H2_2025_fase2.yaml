# ==============================================================================
# BILLUND VARMEVÆRK — EnergyPRO Fase 1 backtest, H2 2025
# ==============================================================================
# Harmoniseret med Billunds EnergyPRO-fil (BVV_VAK26_V1_1.eppx) for at gøre
# en black-box-sammenligning mulig. Alle ændringer ift. billund_baseline.yaml
# er dokumenteret i notat_energypro_backtest_v4.md §3, §5.5 og §7.
#
# KØRES MED:
#   python run_case.py cases/billund_energypro_backtest_H2_2025.yaml \
#       --external --start 2025-07-01 --end 2025-12-31 \
#       --heat-csv data/billund_abvaerk_hourly.csv
#
# RESULTAT-FORTOLKNING:
#   Objektivet er sammenligneligt med EnergyPRO's Reference-scenarie for
#   samme periode med samme inputdata. Fase 1 forventer 3-8% afvigelse,
#   primært fra variabel COP (vores) vs konstant 2,7 (EnergyPRO).
#
#   For Fase 3a (konstant COP=2,7), kør samme kommando med:
#     --set units.vp_luft_vand.cop_curve=null
#     --set units.vp_luft_vand.alpha=-0.370
#   (-0.370 = -1/2.7. cop_curve=null kræver muligvis lille fix i
#   _apply_override; verificeres når vi når dertil.)
# ==============================================================================

meta:
  case_name: "billund_energypro_backtest_H2_2025_fase2"
  description: >
    Fase 2 backtest — balance slået til. H2 2025 (1. juli - 31. dec).
    Som Fase 1, men med aFRR+mFRR-reserver aktiveret og ét fælles 14 MW-loft
    (Billunds faktiske prækvalificering, frit fordelt mellem aFRR og mFRR —
    session 19 §4.2). Halmpris 232 DKK/MWh-fuel (935 DKK/ton ÷ 4,03, session 19).
    Sammenlignes mod billund_balance_facit_H2_2025_*.csv pr. produkt.
    KØRES MED --with-balancing (se nederst).
    FORBEHOLD: elafgift = 4 DKK/MWh (notat-antagelse). Afregningens Tariffer-
    fane viste ~45,6 DKK/MWh — afklares med Steen. Override: --set
    electricity.electricity_tax=45.6
  timezone_internal: "UTC"
  timezone_reporting: "Europe/Copenhagen"
  discount_rate_real: 0.035
  tax_year: 2025

# ------------------------------------------------------------------------------
# TIDSHORISONT
# ------------------------------------------------------------------------------
time:
  start: "2025-07-01T00:00:00Z"
  end:   "2025-12-31T23:00:00Z"
  resolution: "1h"

# ------------------------------------------------------------------------------
# VARMELAST-SYNTESE (parses men ignoreres når --heat-csv er aktivt)
# ------------------------------------------------------------------------------
# I backtesten bruger vi --heat-csv data/billund_abvaerk_hourly.csv og
# suspenderer syntesen helt — så begge modeller får IDENTISK varmebehov.
# Disse parametre er kun her for at YAML-loaderen ikke fejler (heat_load_params
# parses ubetinget af load_heat_load_params i run_case.py).
heat_load_params:
  gaf_mw_per_k: 0.9761
  t_ref: 15.0
  thermal_inertia_hours: 24
  nettab_slope_mw_per_k: 0.6081
  t_net: 12.0
  baseline_profile_mw:
    [5.66, 5.74, 5.87, 6.08, 6.15, 6.52,
     7.13, 7.15, 6.83, 6.32, 6.09, 5.99,
     5.82, 5.70, 5.63, 5.56, 5.65, 5.87,
     6.03, 6.08, 6.04, 6.03, 5.88, 5.60]
  weekly_dip: 0.02
  _source: "Kalibreret mod Billund ab værk 2025-03 → 2026-02 — ignoreres ved --heat-csv"

# ------------------------------------------------------------------------------
# PRISER OG AFGIFTER
# ------------------------------------------------------------------------------
# Naturgas-prisen er ALL-IN: wholesale H2 2025 + energiafgift + CO2-afgift
# + gastransport. NOx/metan-afgifter er enhedsspecifikke og bagt ind i
# unit-niveau var_om (gaskedel og gasmotor har forskellige NOx-satser).
#
# co2_eua = 0 fordi CO2-afgiften allerede er inkluderet i natural_gas.value.
# At sætte co2_eua > 0 ville dobbelt-tælle CO2-omkostningen.
prices:
  natural_gas:
    value: 606.0                      # 271 wholesale + 245 energi + 40 CO2 + 50 transport
    unit: "DKK/MWh_fuel"
    _breakdown:
      wholesale_h2_2025: 271.0
      energiafgift: 245.0             # 2.6950 DKK/Nm³ ÷ 11 kWh/Nm³ × 1000
      co2_afgift: 40.0                # 0.4360 DKK/Nm³ ÷ 11 × 1000
      gastransport: 50.0              # 0.5495 DKK/Nm³ ÷ 11 × 1000
      _note: "NOx/metan tilføjes i var_om pr. enhed (forskellige satser for kedel vs motor)"

  straw:
    value: 232.0                      # 935 DKK/ton ÷ 4,03 MWh-fuel/ton (14,5 GJ/ton) — session 19 §2
    unit: "DKK/MWh_fuel"
    _note: "935 i EnergyPRO-filen var DKK/ton (ikke mislabeled NOx). John bekræfter halmprisen er ok. Eksakt match afhænger af EnergyPRO's GJ/ton."

  waste_heat:
    value: 50.0                       # uændret (overskudsvarme disabled)
    unit: "DKK/MWh_fuel"

  co2_eua:
    value: 0.0                        # CO2-afgift allerede i natural_gas.value
    unit: "DKK/MWh_gas"
    _note: "Sat til 0 for at undgå dobbelttælling. EU ETS indgår ikke separat i EnergyPRO-filen."

# ------------------------------------------------------------------------------
# ELMARKED OG TARIFFER
# ------------------------------------------------------------------------------
# Værdier trukket eksakt ud af EnergyPRO-filen — match for ærlig sammenligning.
electricity:
  spot_area: "DK1"
  tariff_consumption_flat: 125.0      # EnergyPRO transmissionstarif (was 80)
  tariff_production_flat: 4.1         # EnergyPRO elsalgsomkostninger (was 5.0)
  electricity_tax: 4.0                # uændret — matchede allerede EnergyPRO

# ------------------------------------------------------------------------------
# PRODUKTIONSENHEDER
# ------------------------------------------------------------------------------
units:

  # ---- Varmepumpe luft/vand (2025) ----
  # Fase 1: variabel COP (vores standard). Fase 3a: konstant 2,7 via --set.
  vp_luft_vand:
    enabled: true
    type: "heat_pump"
    p_max_heat: 16.0
    p_min_heat: 0.0
    alpha: -0.333                     # fallback når cop_curve sat (ignoreres)
    fuel: "electricity"
    var_om: 13.4                      # EnergyPRO (was 40)
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    cop_curve:
      type: linear
      a: 2.2
      b: 0.08
      cop_min: 1.8
      cop_max: 4.0
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
      afrr_max_bid_mw: 2.65
      mfrr_max_bid_mw: 2.65
    commissioned: 2025

  # ---- Elkedel ny (30 MW, 2025) ----
  elkedel_ny:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 30.0
    p_min_heat: 0.0
    alpha: -1.0                       # EnergyPRO: η=1.0 ideel (was -1.010)
    fuel: "electricity"
    var_om: 13.4                      # EnergyPRO (was 14.5)
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2025

  # ---- Elkedel gammel (15 MW, 2021) ----
  elkedel_gl:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 15.0
    p_min_heat: 0.0
    alpha: -1.0                       # EnergyPRO: η=1.0 ideel (was -1.010)
    fuel: "electricity"
    var_om: 6.71                      # EnergyPRO (was 15)
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2021

  # ---- Halmkedel (12 MW, 2015) ----
  # EnergyPRO: η=0,96, p_min=4 MW, min_uptime=4t, var O&M = 21 DKK/MWh.
  # Plus svovl-afgift 6,84 DKK/MWh_fuel (→ 7,1 DKK/MWh_heat ved η=0,96)
  # plus NOx 1,80 DKK/MWh_heat. Samlet var_om = 21 + 7 + 1,8 = 30.
  halmkedel:
    enabled: true
    type: "biomass_boiler"
    p_max_heat: 12.0
    p_min_heat: 4.0                   # EnergyPRO (was 3.0)
    alpha: 0.0
    fuel: "straw"
    eta_fuel_to_heat: 0.96            # EnergyPRO 12/12.5 (was 0.90)
    var_om: 30.0                      # 21 O&M + 7 svovl + 1.8 NOx (was 50)
    start_cost: 8000.0                # behold (EnergyPRO-fil specificerer ikke)
    min_uptime: 4                     # EnergyPRO (was 12)
    min_downtime: 6
    uc_enabled: true
    initial_status: 1
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2015

  # ---- Gasmotor (én motor, 2,8 MW varme / 2,0 MW el) ----
  # Billund bekræftet 23-apr-2026: kun én motor i drift med 2,8 MW.
  # EnergyPRO-fil viser stadig 2×1,5 MW; flag #8 i notat v4 §8 — rettes
  # i EnergyPRO. Vores model: 1×2,8 MW.
  #
  # var_om = 60 base + 548 (NOx+metan: 269 DKK/MWh_gas ÷ η=0.49 = 548 DKK/MWh_heat)
  # NOx-afgift gasmotor er ~4× højere end gaskedel (2.88 vs 0.72 DKK/Nm³).
  # Det er dyrt at køre gasmotor, og det matcher virkeligheden.
  gasmotor:
    enabled: true
    type: "gas_engine_chp"
    p_max_heat: 2.8                   # Billund-bekræftet (én motor)
    p_min_heat: 0.9
    alpha: 0.72                       # el/varme-ratio
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.49
    var_om: 608.0                     # 60 + 548 (NOx 262 + metan 7 ÷ 0.49)
    start_cost: 2000.0
    min_uptime: 2
    min_downtime: 2
    uc_enabled: false
    initial_status: 0
    co2_emissions_per_mwh_fuel: 0.0   # CO2-afgift allerede i natural_gas.value
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
      afrr_max_bid_mw: 1.0
      mfrr_max_bid_mw: 2.0
    commissioned: 2000

  # ---- Gaskedler aggregeret (16,3 MW) ----
  # Billund 13-maj-2026: gaskedel 10 MW er ikke længere i drift (84% η var
  # for lav). Tilbage: 6 + 5 + 4 + 3 + (mindre) = 16,3 MW.
  # var_om = 20 base + 69 (NOx 65 DKK/MWh_gas ÷ η=0.95 = 69 DKK/MWh_heat).
  gaskedel_agg:
    enabled: true
    type: "gas_boiler"
    p_max_heat: 16.3                  # 26.3 - 10 (was 26.3)
    p_min_heat: 0.0
    alpha: 0.0
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.95
    var_om: 89.0                      # 20 O&M + 69 NOx (was 20)
    start_cost: 500.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    co2_emissions_per_mwh_fuel: 0.0   # CO2 i natural_gas.value
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    notes: "Aggregat efter gaskedel 10 MW er udfaset. Notat v4 §8 punkt 7."

  # ---- Overskudsvarme (disabled) ----
  # Billund 13-maj-2026: ikke i drift i H2 2025.
  overskudsvarme:
    enabled: false
    type: "waste_heat"
    p_max_heat: 4.0
    p_min_heat: 4.0
    alpha: 0.0
    fuel: "waste_heat"
    eta_fuel_to_heat: 1.0
    var_om: 5.0
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2026
    notes: "Disabled i H2 2025 (Billund bekræftet)."

# ------------------------------------------------------------------------------
# VARMELAGER — harmoniseret med EnergyPRO Reference
# ------------------------------------------------------------------------------
# Reference-scenariet har TO tanke (VAK 2.000 m³ + VAK 10.000 m³) på samme
# site med identiske termodynamiske parametre. Vi modellerer dem samlet som
# én tank på 12.000 m³ (notat v4 §5.5).
#
# IncludeLoss=False i EnergyPRO → self_discharge=0 her.
# Intet MW-loft i EnergyPRO → 60 MW (større end samlet produktionsflåde).
# ΔT 40 K = 90°C top, 50°C bund → E_max = 558 MWh.
#
# Begge "match EnergyPRO eksakt" og "flag #9, #10 i notat v4 §8 — bør
# rettes i Billunds operationelle EnergyPRO-fil til fysisk realistiske
# værdier (loss-formularerne er allerede defineret men slået fra)".
storage:

  tank_eksisterende:
    enabled: true
    volume_m3: 12000                  # 2.000 + 10.000 (was 14.000)
    delta_t_k: 40.0                   # EnergyPRO TempTop 90 / TempBottom 50 (was 45)
    e_max_mwh: null                   # auto-beregnes: 558 MWh
    e_initial_mwh: 279                # halvfuld af 558 (was 366)
    p_max_charge_mw: 60.0             # EnergyPRO har intet loft (was 25)
    p_max_discharge_mw: 60.0          # samme (was 25)
    self_discharge_per_hour: 0.0      # EnergyPRO IncludeLoss=False (was 0.0005)
    cycle_binding: true
    notes: "Harmoniseret med EnergyPRO Reference (notat v4 §5.5). Tabsfri og uden MW-loft for at matche EP. Flag som fejl i EnergyPRO-arbejdsgangen."

# ------------------------------------------------------------------------------
# BALANCEMARKED — fælles reserve-loft (Fase 2)
# ------------------------------------------------------------------------------
# Billund er prækvalificeret med ÉT fælles loft på 14 MW, frit fordelt mellem
# aFRR og mFRR (session 19 §4.2 — Johns realiserede tal). Når dette er sat,
# ERSTATTER det de separate per-enhed (units.*.ancillary.*_max_bid_mw) og
# per-gruppe (ancillary_groups) lofter — balancing.py springer dem over.
# Det gamle effektive aFRR-loft var 8,65 MW (VP 2,65 + elkedler 6,0) og var
# for snævert: det efterlod penge på bordet og fordelte aFRR/mFRR forkert.
#
# VIGTIGT: ét loft på SUMMEN — Σ_i (r_aFRR[i,t] + r_mFRR[i,t]) ≤ 14 per time.
# IKKE 14 MW på hvert marked. Footroom-bindingen bevares.
balancing:
  shared_reserve_cap_mw: 14.0

# ------------------------------------------------------------------------------
# ANCILLARY-GRUPPER — INAKTIVE i Fase 2 (afløst af fælles 14 MW-loft ovenfor)
# ------------------------------------------------------------------------------
# Beholdt for dokumentation/bagudkompatibilitet. balancing.py springer disse
# over når shared_reserve_cap_mw er sat. Det samme gælder per-enheds-lofterne
# (vp_luft_vand.ancillary.afrr_max_bid_mw=2.65 osv.).
ancillary_groups:
  elkedler:
    units: [elkedel_ny, elkedel_gl]
    afrr_max_bid_mw: 6.0
    mfrr_max_bid_mw: 6.0

# ------------------------------------------------------------------------------
# INVESTERING (ikke aktiv i backtest)
# ------------------------------------------------------------------------------
investment:
  enabled: false
