# ==============================================================================
# ANDEBY VARMEVÆRK — fiktivt referenceværk, helt kalenderår 2025
# ==============================================================================
# Andeby er et FIKTIVT referenceværk til regulerings-analyser (afgifter,
# tariffer m.m.). Det er afledt af cases/billund_2025.yaml (samme maskine:
# heat-syntese, activation_value-balancering, ancillary-config), men med et
# andet anlæg: ingen biomasse, en solvarmepark, og en flåde skaleret til et
# mindre værk (~100 GWh mod Billunds ~127,5 GWh, faktor 0,784).
#
# NYT i denne case: enhedstypen solar_thermal (fuel: "solar"). Solvarmens
# leverbare effekt bindes af en tidsvarierende profil-CSV
# (data/synthetic_solar_andeby.csv), ikke kun af nameplate. Profilen er
# syntetisk i trin 1 (se scripts/generate_solar_andeby.py) og erstattes
# senere med DMI-solstråling/måledata.
#
# KØRES MED (regulerings-brug = uden balancering, så varmeprisen er ren):
#   python run_case.py cases/andeby.yaml --data-source github
#
# Forventning: LP (ingen UC-enheder — halm/flis er fjernet), solvarme-andel
# ≈ 12 % af varmeproduktionen, sommer-curtailment når tanken er fuld.
#
# INLINE-MARKØRER: [BEKRÆFT] = arvet fra billund_2025 og ikke kalibreret til
# Andeby (fiktivt værk, men hold tallene plausible).
# ==============================================================================

meta:
  case_name: "andeby"
  description: >
    Fiktivt referenceværk til regulerings-analyser. Ingen biomasse; solvarme
    (profil-drevet loft via solar_thermal-enhedstypen); flåde skaleret til
    ~100 GWh. Afledt af billund_2025 (faktor 0,784 på heat_load-parametrene).
  titel: "Andeby — fiktivt referenceværk"
  gruppe: "andeby"
  timezone_internal: "UTC"
  timezone_reporting: "Europe/Copenhagen"
  discount_rate_real: 0.035
  tax_year: 2025

# ------------------------------------------------------------------------------
# TIDSHORISONT — hele kalenderåret 2025
# ------------------------------------------------------------------------------
time:
  start: "2025-01-01T00:00:00Z"
  end:   "2025-12-31T23:00:00Z"
  resolution: "1h"

# ------------------------------------------------------------------------------
# VARMELAST-SYNTESE — skaleret fra Billund med faktor 0,784 (~127,5 → ~100 GWh)
# ------------------------------------------------------------------------------
# baseline_profile_mw, gaf_mw_per_k og nettab_slope_mw_per_k er Billunds v2-
# kalibrering × 0,784. Resten af strukturen (t_ref, EMA, t_net) er uændret.
heat_load_params:
  gaf_mw_per_k: 0.7653          # 0,9761 × 0,784
  t_ref: 15.0
  thermal_inertia_hours: 24
  nettab_slope_mw_per_k: 0.4768 # 0,6081 × 0,784
  t_net: 12.0
  baseline_profile_mw:
    [4.437, 4.500, 4.602, 4.767, 4.822, 5.112,
     5.590, 5.606, 5.355, 4.955, 4.775, 4.696,
     4.563, 4.469, 4.414, 4.359, 4.430, 4.602,
     4.728, 4.767, 4.735, 4.728, 4.610, 4.390]
  weekly_dip: 0.02
  _source: "Billund dual-slope v2 × 0,784 (Andeby ~100 GWh) — aktiv ved syntese"

# ------------------------------------------------------------------------------
# PRISER OG AFGIFTER  [BEKRÆFT — arvet fra billund_2025, ikke Andeby-kalibreret]
# ------------------------------------------------------------------------------
prices:
  natural_gas:
    value: 606.0
    unit: "DKK/MWh_fuel"
  straw:
    value: 232.0
    unit: "DKK/MWh_fuel"
  flis:
    value: 232.0
    unit: "DKK/MWh_fuel"
  waste_heat:
    value: 50.0
    unit: "DKK/MWh_fuel"
  co2_eua:
    value: 600.0           # [BEKRÆFT] ~80 EUR/t × 7,45
    unit: "DKK/MWh_gas"

# ------------------------------------------------------------------------------
# ELMARKED OG TARIFFER  [BEKRÆFT — arvet fra billund_2025]
# ------------------------------------------------------------------------------
electricity:
  spot_area: "DK1"
  tariff_consumption_flat: 125.0
  tariff_production_flat: 4.1
  electricity_tax: 4.0

# ------------------------------------------------------------------------------
# PRODUKTIONSENHEDER — Andebys flåde (ingen biomasse; solvarme tilføjet)
# ------------------------------------------------------------------------------
units:

  vp_luft_vand:
    enabled: true
    type: "heat_pump"
    p_max_heat: 3.4
    p_min_heat: 0.0
    alpha: -0.333
    fuel: "electricity"
    var_om: 13.4
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    cop_curve:
      type: linear
      a: 2.2
      b: 0.08
      cop_min: 1.8
      cop_max: 4.0
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2025

  # ---- Elkedel B (4 MW) ----
  elkedel_ny:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 4.0
    p_min_heat: 0.0
    alpha: -1.0
    fuel: "electricity"
    var_om: 13.4
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2025

  # ---- Elkedel A (12 MW) ----
  elkedel_gl:
    enabled: true
    type: "electric_boiler"
    p_max_heat: 12.0
    p_min_heat: 0.0
    alpha: -1.0
    fuel: "electricity"
    var_om: 6.71
    start_cost: 0.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
    commissioned: 2021

  # ---- Ingen biomasse på Andeby — fliskedel/halmkedel fjernet ----
  fliskedel:
    enabled: false
    type: "biomass_boiler"
    p_max_heat: 7.0
    p_min_heat: 2.0
    alpha: 0.0
    fuel: "flis"
    eta_fuel_to_heat: 0.94
    var_om: 30.0
    start_cost: 5000.0
    min_uptime: 72
    min_downtime: 6
    uc_enabled: true
    initial_status: 1
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2009

  halmkedel:
    enabled: false
    type: "biomass_boiler"
    p_max_heat: 12.0
    p_min_heat: 4.0
    alpha: 0.0
    fuel: "straw"
    eta_fuel_to_heat: 0.96
    var_om: 30.0
    start_cost: 8000.0
    min_uptime: 4
    min_downtime: 6
    uc_enabled: true
    initial_status: 1
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    commissioned: 2015

  gasmotor:
    enabled: true
    type: "gas_engine_chp"
    p_max_heat: 10.5
    p_min_heat: 0.9
    alpha: 0.838              # [BEKRÆFT] el 8,8 MW / varme 10,5 MW
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.49
    var_om: 608.0             # [BEKRÆFT] arvet fra billund_2025
    start_cost: 2000.0
    min_uptime: 2
    min_downtime: 2
    uc_enabled: false
    initial_status: 0
    co2_emissions_per_mwh_fuel: 0.2   # fysisk udledning naturgas
    ancillary:
      afrr_qualified: true
      mfrr_qualified: true
      fcr_qualified: false
      afrr_max_bid_mw: 1.0
      mfrr_max_bid_mw: 2.0
    commissioned: 2000

  gaskedel_agg:
    enabled: true
    type: "gas_boiler"
    p_max_heat: 20.0
    p_min_heat: 0.0
    alpha: 0.0
    fuel: "natural_gas"
    eta_fuel_to_heat: 0.95
    var_om: 89.0             # [BEKRÆFT] arvet fra billund_2025
    start_cost: 500.0
    min_uptime: 1
    min_downtime: 1
    uc_enabled: false
    co2_emissions_per_mwh_fuel: 0.2   # fysisk udledning naturgas
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}

  # ---- NY: solvarmepark (Sol 1 + Sol 2 = 30.000 m²) ----
  solvarme:
    enabled: true
    type: "solar_thermal"
    p_max_heat: 22.0                 # nameplate; profil binder reelt ~8,3 MW peak
    p_min_heat: 0.0
    alpha: 0.0
    fuel: "solar"
    var_om: 0.0
    start_cost: 0.0
    uc_enabled: false
    production_profile_path: "data/synthetic_solar_andeby.csv"
    ancillary: {afrr_qualified: false, mfrr_qualified: false, fcr_qualified: false}
    notes: "Syntetisk profil i trin 1; udskiftes med DMI-solstråling/måledata senere."

# ------------------------------------------------------------------------------
# VARMELAGER — mindre tank end Billund (10.000 m³)
# ------------------------------------------------------------------------------
storage:
  tank_eksisterende:
    enabled: true
    volume_m3: 10000
    delta_t_k: 45.0           # [BEKRÆFT] frem/retur
    e_max_mwh: null           # beregnes ≈ 523 MWh fra volume + Δt
    e_initial_mwh: 261        # halvfuld; cycle_binding fikser slutniveau
    p_max_charge_mw: 25.0     # [BEKRÆFT]
    p_max_discharge_mw: 25.0  # [BEKRÆFT]
    self_discharge_per_hour: 0.0005
    cycle_binding: true
    notes: "Andeby-tank (fiktiv). Δt/lade-effekt arvet fra billund_2025."

# ------------------------------------------------------------------------------
# BALANCEMARKED — arvet fra billund_2025 (inert uden --with-balancing)
# ------------------------------------------------------------------------------
# Regulerings-brug kører UDEN --with-balancing, så denne blok er inaktiv og
# varmeprisen er ren. Beholdt for fidelity hvis Andeby senere skal byde.
balancing:
  method: activation_value
  bid_strategy:
    up_markup_dkk_mwh: 500
    up_markup_max_dkk_mwh: 2000
  ancillary_caps:
    per_unit_mw:
      vp_luft_vand: 6.0       # [BEKRÆFT] arvet; inert uden balancering
    total_mw: 14.0            # [BEKRÆFT] arvet fra billund

# ------------------------------------------------------------------------------
# INVESTERING (ikke aktiv)
# ------------------------------------------------------------------------------
investment:
  enabled: false
