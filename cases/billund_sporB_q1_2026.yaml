# ------------------------------------------------------------------------------
# BALANCEMARKED — activation_value + CM-pris-gate (Spor B, driven)
# ------------------------------------------------------------------------------
# reservation_gate (Spor B, deskriptiv):
#   enabled: true, mode: driven → reservationen DRIVES af CM-gaten:
#       Σ_i r_m[i,t] == gate_m(t) · block_mw
#   gate_m(t) = 1 hvis CM_m(t) ≥ cm_threshold_dkk_mw_h ellers 0.
#   Tærskel + blok er Q1-2026-snit-kalibrering (afledte parametre, ikke rådata):
#     aFRR: τ=100, B=3.0  → gate-frekvens ~24 % → MW-snit ~0,73 ≈ facit 0,73
#     mFRR: τ=421, B=5.1  → gate-frekvens ~9 %  → MW-snit ~0,48 ≈ facit 0,48
#   mode: bound reserveres til Spor A (normativ, forventet CM-pris + opportunity
#   cost-tærskel) — byg-klar, men køres ikke nu.
balancing:
  method: activation_value
  bid_strategy:
    up_markup_dkk_mwh: 500
    up_markup_max_dkk_mwh: 2000
  ancillary_caps:
    per_unit_mw:
      vp_luft_vand: 6.0
    total_mw: 14.0           # Billunds faktiske prækvalificering — gaten binder før loftet
  reservation_gate:
    enabled: true
    mode: driven             # driven (Spor B) | bound (Spor A senere)
    afrr: { cm_threshold_dkk_mw_h: 100, block_mw: 3.0 }
    mfrr: { cm_threshold_dkk_mw_h: 421, block_mw: 5.1 }

# ------------------------------------------------------------------------------
# INVESTERING (ikke aktiv i backtest)
# ------------------------------------------------------------------------------
investment:
  enabled: false
