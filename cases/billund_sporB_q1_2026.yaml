# ==============================================================================
# BILLUND VARMEVÆRK — Spor B (deskriptiv): CM-pris-gate på reservationen
# ==============================================================================
# Afledt af billund_backtest_jan_apr_2026.yaml (samme flåde, samme periode,
# elkedel_ny ude). Eneste ændring ift. backtest-casen: reservation_gate er
# aktiv (mode=driven). Reservationen drives nu af markedets day-ahead
# kapacitetspris (CM) i stedet for at være kontinuerlig op til loftet.
#
# EMPIRISK FUNDAMENT (jf. noter/notat_sporB_design.md):
#   Billunds reservation er en gate på CM-prisen: reservationsfrekvensen stiger
#   monotont fra ~3 % (lav CM) til ~70 % (høj CM). Vi modellerer det som en hard
#   CM-tærskel pr. marked. Tærskel + blok er kalibreret til Q1-2026-snit, så
#   gate-frekvens × blok = facit MW-snit (aFRR 0,73 / mFRR 0,48).
#
# KØRES MED:
#   python run_case.py cases/billund_sporB_q1_2026.yaml \
#       --data-source github --df-data-cache data/df-data --with-balancing \
#       --start 2026-01-01 --end 2026-04-30 \
#       --heat-csv data/billund_abvaerk_hourly.csv \
#       --balancing-method activation_value --out-dir output/sporB_q1_2026
#
# VALIDERING: scripts/capture_rate_q1_2026.py mod balance-facit Q1 2026.
#   1. Reservation MW-snit pr. måned (aFRR) reproducerer det selektive mønster
#      0,51 / 0,04 / 1,12 / 1,23 (særligt februar-dykket).
#   2. Kapacitetsindtægt nærmer sig facit 2,17 mio (fra modellens 4,36).
#   3. Aktiverings-capture stiger markant fra ~6 % (tester foresight-hypotesen).
#
# total_mw blir på 14 (Billunds prækvalificering): gaten binder før loftet, så
# cap-niveauet bør være ~irrelevant nu — det er i sig selv en bekræftelse.
# ==============================================================================

meta:
  case_name: "billund_sporB_q1_2026"
  description: >
    Spor B (deskriptiv): CM-pris-gate (mode=driven) på reservationen. Samme
    flåde/periode som backtest_jan_apr_2026 (elkedel_ny ude, cap 14 MW). Gaten
    drives af day-ahead CM-prisen pr. marked; tærskler kalibreret til Q1-2026.
    Sammenlignes mod realiseret balance-facit.
  timezone_internal: "UTC"
  timezone_reporting: "Europe/Copenhagen"
  discount_rate_real: 0.035
  tax_year: 2026

